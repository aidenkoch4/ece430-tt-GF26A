# Tiny Tapeout project information
project:
  title:        "Three Channel RGB PWM Controller"      # Project title
  author:       "Aiden Koch"      # Your name
  discord:      "N/A"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Red Green Blue compatable Pulse Width Modulator to control effective voltages at an LED to control the color output. User defiend clock divider included to increase range of application usage."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz: 0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_aidenkoch4"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_aidenkoch4.v"
    - "rgb_pwm_core.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).

pinout:
  ui[0]: "value bit 0"
  ui[1]: "value bit 1"
  ui[2]: "value bit 2"
  ui[3]: "value bit 3"
  ui[4]: "value bit 4"
  ui[5]: "value bit 5"
  ui[6]: "mode bit 0"
  ui[7]: "mode bit 1"

  uo[0]: "PWM Red"
  uo[1]: "PWM Green"
  uo[2]: "PWM Blue"
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""
  
yaml_version: 6
